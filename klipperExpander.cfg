[mcu expander]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_0C0005000C43303054313620-if00
restart_method: command

[temperature_sensor expander_temp]
sensor_type: temperature_mcu
sensor_mcu: expander
min_temp: 0
max_temp: 100


