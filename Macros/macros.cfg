[gcode_macro incrementa]
variable_start: 31
gcode:
   UPDATE_DELAYED_GCODE ID=_timer DURATION=1

[delayed_gcode _timer]
initial_duration: 0
gcode:
  {% set curr = printer["gcode_macro incrementa"].start|int - 1 %}
  ###{% set fine = 10|int %}  ### > 300 signigica 5 minuti, 600=10 minuti
  SET_GCODE_VARIABLE MACRO=incrementa VARIABLE=start VALUE={curr}
  {% if curr < 1 %}
    UPDATE_DELAYED_GCODE ID=_timer DURATION=0
    M117 Switch off printer!!!
    M118 Switch off printer!!!
    PRINTER_OFF
  {% else %}
    UPDATE_DELAYED_GCODE ID=_timer DURATION=1
    M117 Switching off printer in:... {curr} seconds
    M118 Switching off printer in:... {curr} seconds
  {% endif %}

