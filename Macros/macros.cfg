[gcode_macro PRIME_BLOB]
description: Prints a primeblob, used internally, if configured, as part of the START_PRINT macro. Slower than PRIME_LINE but much more effective.
gcode:
  SAVE_GCODE_STATE NAME=prime_blob_state
  M117 Nozzle cleaning with prime blob ...
  M118 Nozzle cleaning with prime blob ...
  
  ###{% set speed= params.S|default(100)|float %}      #edit to your park position
  {% set speed= params.S|default(100)|float * 60  %}

  # Absolute positioning
  G90 
  # Relative extrusion
  M83
  # Lift 5 mm
  G1 Z5 F3000
  # move to blob position
  G1 X{printer.toolhead.axis_minimum.x + 8} Y{printer.toolhead.axis_maximum.y - 15} Z0.5 F{speed}
  # Extrude a blob
  G1 F60 E20
  # 40% fan
  M106 S102 
  # Move the extruder up by 5mm while extruding, breaks away from blob
  G1 Z5 F100 E5  
  # Move to wipe position, but keep extruding so the wipe is attached to blob
  G1 F200 Y{printer.toolhead.axis_maximum.y - 40} E1 
  # Go down diagonally while extruding
  # Broken down in z moves under 2mm as a workaround for a tuning tower test.
  # The tuning tower command thinks a new print has been started when z moves over 2mm and aborts.
  G1 F200 Y{printer.toolhead.axis_maximum.y - 45} Z3.8 E0.5
  G1 F200 Y{printer.toolhead.axis_maximum.y - 50} Z2.6 E0.5
  G1 F200 Y{printer.toolhead.axis_maximum.y - 55} Z1.4 E0.5
  G1 F200 Y{printer.toolhead.axis_maximum.y - 60} Z0.2 E0.5
  # 0% fan
  M106 S0
  # small wipe line
  G1 F200 Y{printer.toolhead.axis_maximum.y - 65} Z0.2 E0.6 
  # Break away wipe
  G1 F{speed} Y{printer.toolhead.axis_maximum.y - 100}
  RESTORE_GCODE_STATE NAME=prime_blob_state

[gcode_macro END_PRINT]
###come usare con PrusaSlicer per esempio: END_PRINT S={travel_speed}
gcode:
  {% set S= params.S|default(100) %}      #edit to your park position
  ;;;fine stampa
  
  set_led_green

  M117 Cooling down ...
  M118 Cooling down ...

  G91 ;relative positioning
    {% if printer.extruder.can_extrude|lower == 'true' %}
      G1 Z+5 F{S} ;move Z up  
      G1 E-3 F300 ;retract the filament a bit before lifting the nozzle, to release some of the pressure
      G1 E-5 F{S} ;retract filament even more
    {% else %}
      G1 Z+5 F{S} ;move Z up e
      {action_respond_info("Estrusore freddo!!!")}
    {% endif %}  

  ###G28 X0 Y0 ;move X/Y to min endstops, so the head is out of the way
  G90 ;Absolute positionning
  
  G1 X10 F3000 ;Present print
  G1 Y110 F3000 ;Present print  
  G1 X100 F3000 ;Present print
  M104 S0 ; turn off extruder
  
  # Turn off bed, extruder and fan
  M140 S0
  M104 S0
  M106 S0
   
  M84 ; disable motors
  M107 ; Fan off
  SET_FAN_SPEED FAN=nevermore SPEED=0.0
  
  #BEEP_CONFIRM
 
  ################################################################ 
  clear_last_file
  SAVE_VARIABLE VARIABLE=was_interrupted VALUE=False
  ################################################################

  TIMELAPSE_RENDER
  UPDATE_DELAYED_GCODE ID=_done_shutdown_timer DURATION=1
  M117 Off countdown ...
  M118 Off countdown ...
  ;;;the end

[delayed_gcode _done_shutdown_timer]
initial_duration: 0
gcode:
  {% if printer.extruder.temperature > 50 %}
    UPDATE_DELAYED_GCODE ID=_done_shutdown_timer DURATION=1
    ###m117 ciclo2...
  {% else %}

    UPDATE_DELAYED_GCODE ID=_done_shutdown_timer DURATION=0
    
    ###SAVE_VARIABLE VARIABLE=dariavviare VALUE=1
    ########Z_OFFSET_APPLY_ENDSTOP ; if you have a usual endstop.
    ###Z_OFFSET_APPLY_PROBE ; if you have a BLtouch or similar)
    ###SAVE_CONFIG
    M117 Shutdown ...
    M118 Shutdown ...
    ###spegni_stampante
    incrementa
  {% endif %}

	
[gcode_macro LOAD_FILAMENT]
gcode:
   M83                            ; set extruder to relative
   G1 E30 F300                    ; load
   G1 E30 F150                    ; prime nozzle with filament
   M82                            ; set extruder to absolute
    
[gcode_macro UNLOAD_FILAMENT]
gcode:
   M83                            ; set extruder to relative
   G1 E10 F300                    ; extrude a little to soften tip
   G1 E-80 F1800                  ; retract some, but not too much or it will jam
   M82                            ; set extruder to absolute

[gcode_macro PURGE]
gcode:
      M117 PURGING FILAMENT...
      M118 PURGING FILAMENT...
      G91
      G1 E20.0 F250
      G90

