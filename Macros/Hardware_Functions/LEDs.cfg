[gcode_macro set_led_red]
gcode:
###  SET_LED LED=neopixel RED=1 GREEN=0.0 BLUE=0.0  SYNC=0 
  SET_LED LED=Case RED=1.0 GREEN=0.0 BLUE=0.0  SYNC=0 

[gcode_macro set_led_off]
gcode:
  SET_LED LED=Case RED=0 GREEN=0.0 BLUE=0.0  SYNC=0
  


[gcode_macro set_led_green]
gcode:
  SET_LED LED=Case RED=0.0 GREEN=1 BLUE=0.0  SYNC=0 

[gcode_macro set_led_blue]
gcode:
  SET_LED LED=Case RED=0.0 GREEN=0.0 BLUE=1  SYNC=0 

[gcode_macro set_led_yellow]
gcode:
  SET_LED LED=Case RED=1 GREEN=1 BLUE=0.0  SYNC=0

[gcode_macro set_led_ciano]
gcode:
  SET_LED LED=Case RED=0.0 GREEN=1 BLUE=1  SYNC=0 

[gcode_macro set_led_magenta]
gcode:
  SET_LED LED=Case RED=1 GREEN=0.0 BLUE=1  SYNC=0 

[gcode_macro set_led_white]
gcode:
  SET_LED LED=Case RED=1 GREEN=1 BLUE=1  SYNC=0 
  